<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zap Zap</title>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#290b47">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #290b47; 
      overflow: hidden;
      font-family: -apple-system, sans-serif;
    }
    #root { height: 100%; width: 100%; }
    * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
    
    @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes brainFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const BP = {
      pink: "#e60c78", white: "#FFFF11", cyan: "#00F0FF",
      basecolour: "#290b47", text: "#FFFFFF", textLight: "#FFFFFF",
    };

    const FONTS = {
      importUrl: "https://fonts.googleapis.com/css2?family=Henny+Penny&family=Montserrat:wght@600&display=swap",
      title: "'Henny Penny', cursive",
      body: "'Montserrat', sans-serif",
    };

    const RING_COLORS = ["#F5C7F2", "#00FFC5", "#FFFD77", "#85C7F2", "#FF5F59", "#B2B09B", "#E3B5A4", "#FFB300"];
    const INTENSITY_STEPS = 9;
    const intensityMult = (idx) => 0.1 + (idx / (INTENSITY_STEPS - 1)) * 0.9;
    const SLEEP_BASE = 10;

    const ACTIVITIES = [
      { id: "outside", label: "Outside Time", emoji: "⚽", power: 30 },
      { id: "veggies", label: "Eating Veggies", emoji: "🥦", power: 10 },
      { id: "reading", label: "Reading", emoji: "📚", power: 15 },
      { id: "writing", label: "Writing", emoji: "✏️", power: 15 },
      { id: "creating", label: "Creating", emoji: "🪄", power: 15 },
      { id: "puzzles", label: "Puzzles", emoji: "♟️", power: 15 },
      { id: "firsttime", label: "First Time!", emoji: "🌟", power: 8, isFirstTime: true },
    ];

    const KIDS = [
      { id: "lara", name: "Lara", emoji: "👧🏻", color: "#e60c78" },
      { id: "ari", name: "Ari", emoji: "👦🏻", color: "#ff6c06" },
      { id: "astrid", name: "Astrid", emoji: "👶🏻", color: "#f42a53" },
    ];

    const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const load = (k) => { const val = localStorage.getItem(k); return val ? JSON.parse(val) : null; };

    function BrainSVG({ size = 100 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 100">
           <circle cx="50" cy="50" r="40" fill={BP.pink} opacity="0.2" />
           <text x="50" y="62" fontSize="50" textAnchor="middle">🧠</text>
        </svg>
      );
    }

    function BrainShield({ intensities, immunity, germLevel = 0 }) {
      const BRAIN = 100, SLEEP_R = 50, RING_START = 65, GAP = 12;
      const rings = ACTIVITIES.map((a, i) => ({ 
        idx: intensities[a.id] ?? null, 
        color: RING_COLORS[i % RING_COLORS.length], 
        i 
      })).filter((r) => r.idx !== null);
      
      const maxR = rings.length > 0 ? RING_START + (rings.length - 1) * GAP : RING_START;
      const W = (maxR + 25) * 2, H = (maxR + 25) * 2, cx = W / 2, cy = H / 2;
      
      return (
        <div style={{ position: "relative", width: W, height: H, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width={W} height={H} style={{ position: "absolute", inset: 0, overflow: "visible" }}>
            <circle cx={cx} cy={cy} r={SLEEP_R} fill="none" stroke="#FFF" strokeWidth="2" strokeDasharray="5 5" opacity="0.3" />
            {rings.map((ring, ri) => {
              const r = RING_START + ri * GAP;
              const arc = 2 * Math.PI * r;
              const fill = 0.23 + ((ring.idx + 1) / INTENSITY_STEPS) * 0.47;
              return (
                <circle 
                  key={ri} cx={cx} cy={cy} r={r} fill="none" stroke={ring.color} strokeWidth="8" 
                  strokeDasharray={`${arc * fill} ${arc * (1 - fill)}`} strokeLinecap="round" 
                  style={{ animation: `${ri % 2 === 0 ? 'spinCW' : 'spinCCW'} 10s linear infinite`, transformOrigin: `${cx}px ${cy}px` }} 
                />
              );
            })}
          </svg>
          <div style={{ animation: "brainFloat 3.5s ease-in-out infinite" }}><BrainSVG size={BRAIN} /></div>
        </div>
      );
    }

    function Slider({ steps, value, onChange, fill }) {
      const ref = useRef(null);
      const update = (clientX) => {
        const rect = ref.current.getBoundingClientRect();
        const r = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        onChange(Math.round(r * steps));
      };
      return (
        <div ref={ref} onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); update(e.clientX); }} onPointerMove={(e) => { if(e.buttons) update(e.clientX); }} style={{ position: "relative", height: 40, display: "flex", alignItems: "center", touchAction: "none" }}>
          <div style={{ position: "absolute", width: "100%", height: 10, background: "rgba(255,255,255,0.1)", borderRadius: 10 }} />
          <div style={{ position: "absolute", width: `${(value/steps)*100}%`, height: 10, background: fill, borderRadius: 10 }} />
        </div>
      );
    }

    function ActivityChip({ activity, aIdx, intensityIdx, onSet, onClear, expanded, onToggle }) {
      const active = intensityIdx !== null, rc = RING_COLORS[aIdx % RING_COLORS.length];
      return (
        <div style={{ borderRadius: 16, background: expanded ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.05)", marginBottom: 10, padding: "12px 16px" }} onClick={onToggle}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: "1.5rem" }}>{activity.emoji}</span>
            <span style={{ fontFamily: FONTS.body, color: "#FFF", flex: 1, fontWeight: 600 }}>{activity.label}</span>
            {expanded && <button onClick={(e) => { e.stopPropagation(); onClear(); }} style={{ background: 'rgba(255,255,255,0.1)', border: 'none', color: '#FFF', borderRadius: 10, padding: '4px 8px', fontSize: '0.7rem' }}>Clear</button>}
          </div>
          {expanded && <div onClick={e => e.stopPropagation()} style={{ marginTop: 12 }}><Slider steps={INTENSITY_STEPS} value={active ? intensityIdx + 1 : 0} onChange={v => v === 0 ? onClear() : onSet(v - 1)} fill={rc} /></div>}
        </div>
      );
    }

    function BrainBank() {
      const [immunity, setImmunity] = useState(SLEEP_BASE);
      const [tab, setTab] = useState("immunity");
      const [intensities, setIntensities] = useState({});
      const [tvToday, setTvToday] = useState("no");
      const [germLevel, setGermLevel] = useState(1);
      const [expanded, setExpanded] = useState(null);

      useEffect(() => {
        const s = load("zap-zap-final");
        if (s) { setImmunity(s.immunity); setIntensities(s.intensities); setTvToday(s.tvToday); setGermLevel(s.germLevel); }
      }, []);

      useEffect(() => { save("zap-zap-final", { immunity, intensities, tvToday, germLevel }); }, [immunity, intensities, tvToday, germLevel]);

      const setInt = (a, idx) => {
        const prev = intensities[a.id] ?? null;
        const change = Math.round(a.power * intensityMult(idx)) - (prev !== null ? Math.round(a.power * intensityMult(prev)) : 0);
        setImmunity(p => Math.min(100, Math.max(0, p + change)));
        setIntensities(p => ({ ...p, [a.id]: idx }));
      };

      return (
        <div style={{ maxWidth: 420, margin: "0 auto", padding: "20px", paddingBottom: 100 }}>
          <div style={{ textAlign: 'center', marginBottom: 25 }}>
            <div style={{ fontFamily: FONTS.title, fontSize: '2.8rem', color: '#FFF' }}>Zap Zap</div>
          </div>
          
          <div style={{ display: 'flex', justifyContent: 'center', gap: 15, marginBottom: 20 }}>
            {KIDS.map(k => <div key={k.id} style={{ width: 50, height: 50, borderRadius: '25%', background: k.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem' }}>{k.emoji}</div>)}
          </div>

          {tab === "immunity" && (
            <div>
              <BrainShield intensities={intensities} immunity={immunity} germLevel={germLevel} />
              <div style={{ textAlign: 'center', color: '#FFF', opacity: 0.6, fontSize: '0.9rem', marginBottom: 20, fontWeight: 700 }}>
                 Immunity: {immunity}%
              </div>
              {ACTIVITIES.map((a, i) => (
                <ActivityChip 
                  key={a.id} activity={a} aIdx={i} intensityIdx={intensities[a.id] ?? null} 
                  expanded={expanded === a.id} onToggle={() => setExpanded(expanded === a.id ? null : a.id)} 
                  onSet={idx => setInt(a, idx)} onClear={() => {
                    const prev = intensities[a.id];
                    if (prev !== null) setImmunity(p => Math.max(0, p - Math.round(a.power * intensityMult(prev))));
                    setIntensities(p => { const n = {...p}; delete n[a.id]; return n; });
                  }} 
                />
              ))}
            </div>
          )}

          {tab === "schedule" && (
            <div style={{ padding: 30, background: 'rgba(255,255,255,0.05)', borderRadius: 24, textAlign: 'center' }}>
               <div style={{ fontSize: '3rem', marginBottom: 15 }}>{tvToday === "yes" ? "🏆" : "🦠"}</div>
               <div style={{ fontSize: '1.4rem', color: '#FFF', fontWeight: 700 }}>{tvToday === "yes" ? "TV TIME!" : "NO TV YET"}</div>
               <p style={{ color: '#FFF', opacity: 0.6, marginTop: 10 }}>Keep zapping germs to win!</p>
            </div>
          )}

          {tab === "parent" && (
            <div style={{ color: '#FFF' }}>
              <div style={{ marginBottom: 20 }}>
                <p>Today's Reward:</p>
                <button onClick={() => setTvToday(tvToday === "yes" ? "no" : "yes")} style={{ width: '100%', padding: 15, background: tvToday === "yes" ? BP.pink : '#333', color: '#FFF', border: 'none', borderRadius: 12 }}>
                  Toggle TV Reward: {tvToday.toUpperCase()}
                </button>
              </div>
              <p>Germ Visuals:</p>
              <div style={{ display: 'flex', gap: 10 }}>
                {[0,1,2,3].map(l => <button key={l} onClick={() => setGermLevel(l)} style={{ flex: 1, padding: 12, background: germLevel === l ? BP.pink : '#333', color: '#FFF', border: 'none', borderRadius: 10 }}>Level {l}</button>)}
              </div>
            </div>
          )}

          <div style={{ position: 'fixed', bottom: 20, left: '50%', transform: 'translateX(-50%)', width: '90%', maxWidth: 380, background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(10px)', display: 'flex', padding: 8, borderRadius: 20, gap: 5 }}>
            <button onClick={() => setTab("immunity")} style={{ flex: 1, padding: '12px', background: tab === "immunity" ? BP.pink : "none", color: "#FFF", border: "none", borderRadius: 15 }}>🛡️</button>
            <button onClick={() => setTab("schedule")} style={{ flex: 1, padding: '12px', background: tab === "schedule" ? BP.pink : "none", color: "#FFF", border: "none", borderRadius: 15 }}>📺</button>
            <button onClick={() => setTab("parent")} style={{ flex: 1, padding: '12px', background: tab === "parent" ? BP.pink : "none", color: "#FFF", border: "none", borderRadius: 15 }}>⚙️</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BrainBank />);
  </script>
</body>
</html>
