<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zap Zap</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#290b47">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Henny+Penny&family=Montserrat:wght@600&display=swap');
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #290b47; overflow-x: hidden; font-family: 'Montserrat', sans-serif; color: #fff; }
    #root { height: 100%; width: 100%; }
    .elsie { font-family: 'Henny Penny', cursive !important; font-weight: 900; }
    @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes brainFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes haloPulse { 0%, 100% { opacity: .2; } 50% { opacity: .55; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(.82) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes shoot { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes starPop { 0% { opacity: 0; transform: scale(0) rotate(-20deg); } 70% { transform: scale(1.3) rotate(8deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
    @keyframes starSpin { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
    @keyframes softPulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    button:active { transform: scale(.94) !important; }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 15px 0; }
    input[type=range]::-webkit-slider-runnable-track { height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #00F0FF; margin-top: -7px; box-shadow: 0 0 15px #00F0FF; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BP = {
      pink: "#e60c78",
      roundbuttons: "#290b47",
      white: "#FFFF11",
      cyan: "#00F0FF",
      basecolour: "#290b47",
      roundbuttonsTint: "#E6F7F7",
      text: "#FFFFFF",
      textMed: "#FFFFFF",
      textLight: "#FFFFFF",
      textDark: "#290b47",
      coral: "#E05070",
      gold: "#D4A020",
      sliderBg: "#e60c78",
      sliderFg: "#290b47",
    };

    const FONTS = {
      importUrl: "https://fonts.googleapis.com/css2?family=Henny+Penny&family=Montserrat:wght@600&display=swap",
      title: "'Henny Penny', system-ui, serif",
      body: "'Montserrat', Verdana, sans-serif",
    };

    const RING_COLORS = ["#F5C7F2", "#00FFC5", "#FFFD77", "#85C7F2", "#FF5F59", "#B2B09B", "#E3B5A4", "#FFB300"];
    const INTENSITY_STEPS = 9;
    const intensityMult = (idx) => 0.1 + (idx / (INTENSITY_STEPS - 1)) * 0.9;
    const SLEEP_BASE = 10;
    const GLOW = 100;

    const ACTIVITIES = [
      { id: "outside", label: "Outside Time", emoji: "⚽", power: 30 },
      { id: "veggies", label: "Eating Veggies", emoji: "🥦", power: 10 },
      { id: "reading", label: "Reading", emoji: "📚", power: 15 },
      { id: "writing", label: "Writing", emoji: "✏️", power: 15 },
      { id: "creating", label: "Creating", emoji: "🪄", power: 15 },
      { id: "puzzles", label: "Puzzles", emoji: "♟️", power: 15 },
      { id: "firsttime", label: "First Time!", emoji: "🌟", power: 8, isFirstTime: true },
    ];

    const KIDS = [
      { id: "lara", name: "Lara", emoji: "👧🏻", color: "#e60c78" },
      { id: "ari", name: "Ari", emoji: "👦🏻", color: "#ff6c06" },
      { id: "astrid", name: "Astrid", emoji: "👶🏻", color: "#f42a53" },
    ];

    const STRENGTH = [
      { min: 0, max: 14, label: "Thin Protection", color: BP.textLight },
      { min: 15, max: 29, label: "Small Protection", color: BP.textLight },
      { min: 30, max: 49, label: "Some Protection", color: BP.textLight },
      { min: 50, max: 64, label: "Good Protection", color: BP.textLight },
      { min: 65, max: 79, label: "Strong Protection", color: BP.textLight },
      { min: 80, max: 100, label: "Super Strong Protection! 💪", color: BP.textLight },
    ];

    const getStr = (lv) => STRENGTH.find((s) => lv >= s.min && lv <= s.max) || STRENGTH[0];

    const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const load = (k) => { const val = localStorage.getItem(k); return val ? JSON.parse(val) : null; };

    function BrainSVG({ size = 100 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 36 36">
          <path d="M50,82 C36,82 22,74 18,62 C14,50 16,38 22,30 C28,22 36,18 42,20 C44,16 48,14 52,15 L52,82 Z" fill="#EA596E" opacity="0.3" />
          <path d="M50,82 C64,82 78,74 82,62 C86,50 84,38 78,30 C72,22 64,18 58,20 C56,16 52,14 48,15 L48,82 Z" fill="#EA596E" opacity="0.3" />
          <path fill="#EA596E" d="M29.896 26.667c.003.283-.07.653-.146.958c-.531 2.145-2.889 4.552-6.208 4.333c-3.008-.198-5.458-1.642-5.458-3.667s2.444-3.667 5.458-3.667s6.335.018 6.354 2.043z" />
          <path fill="#DD2E44" d="M23.542 24.964c-1.619 0-5.314.448-6.162.448c-1.498 0-2.713.94-2.713 2.1c0 .558.286 1.062.744 1.438c0 0 1.006 1.009 2.818.525c.793-.212 2.083-1.786 4.354-2.036c1.131-.125 3.25.75 6.974.771c.16-.344.193-.583.193-.583c0-2.027-3.194-2.663-6.208-2.663z" />
          <path fill="#F4ABBA" d="M29.75 27.625s2.184-.443 3.542-2.229c1.583-2.083 1.375-4.312 1.375-4.312c1.604-3-.5-5.813-.5-5.813C33.958 12.104 32 10.792 32 10.792c-1.271-3.021-4.083-3.833-4.083-3.833c-2.208-2.583-6.125-2.5-6.125-2.5s-3.67-1.345-8.708.167c-.833.25-3.625.833-5.667 2.083C.981 10.649.494 16.793.584 17.792C1.083 23.375 5 24.375 7.5 24.958c.583 1.583 2.729 4.5 6.583 3.417c4.75-.833 6.75-2.25 7.917-2.25s4.417 1.25 7.75 1.5z" />
        </svg>
      );
    }

    function BrainShield({ intensities, immunity, isGlowing, germLevel = 0 }) {
      const BRAIN = 100, SLEEP_R = BRAIN, RING_START = SLEEP_R + 10, GAP = 10;
      const germOpacity = [0, 0.18, 0.42, 0.72][germLevel];
      const germCount = [0, 10, 18, 28][germLevel];
      const bounceAmp = [0, 8, 22, 48][germLevel];
      const bounceSpeed = [0, 5, 3.5, 2][germLevel];
      const sparkCountBase = [0, 2, 5, 9][germLevel];

      const [sparks, setSparks] = useState([]);
      const sparkId = useRef(0);

      useEffect(() => {
        const iv = setInterval(() => {
          if (germLevel === 0) return;
          const count = sparkCountBase + Math.floor(Math.random() * 2);
          const base = Math.random() * 2 * Math.PI;
          setSparks(Array.from({ length: count }, (_, i) => ({
            id: sparkId.current++,
            angle: base + (i - count / 2) * 0.35 + (Math.random() - 0.5) * 0.2,
            size: 2 + Math.random() * 2,
            travel: 20 + Math.random() * 20,
            dur: 700 + Math.random() * 300,
            color: "#FFD700",
          })));
          setTimeout(() => setSparks([]), 1100);
        }, 2200);
        return () => clearInterval(iv);
      }, [germLevel]);

      const seeds = useRef([...Array(28)].map((_, i) => ({
          angle: i % 2 === 0 ? (Math.random() - 0.5) * 2.4 : Math.PI + (Math.random() - 0.5) * 2.4,
          bandFrac: Math.random(),
          size: Math.random() * 16 + 11,
          speedMult: 0.7 + Math.random() * 0.6,
          rotation: Math.random() * 360,
      }))).current;

      const ringDurs = useRef(ACTIVITIES.map((_, i) => 8 + i * 0.7 + Math.random() * 2)).current;
      const rings = ACTIVITIES.map((a, i) => ({ idx: intensities[a.id] ?? null, color: RING_COLORS[i % RING_COLORS.length], i, isFirstTime: !!a.isFirstTime })).filter((r) => r.idx !== null);
      const maxR = rings.length > 0 ? RING_START + (rings.length - 1) * GAP : RING_START;
      const W = (maxR + 4) * 2, H = (maxR + 4) * 2, cx = W / 2, cy = H / 2;
      const s = getStr(immunity);
      const bandInner = SLEEP_R + 6, bandOuter = maxR + 44;

      return (
        <div style={{ position: "relative", width: W, height: H, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width={W} height={H} style={{ position: "absolute", inset: 0, overflow: "visible" }}>
            {germCount > 0 && seeds.slice(0, germCount).map((seed, i) => {
              const radialDist = bandInner + seed.bandFrac * (bandOuter - bandInner);
              const gx = cx + Math.cos(seed.angle) * radialDist, gy = cy + Math.sin(seed.angle) * radialDist;
              return <text key={i} x={gx} y={gy} fontSize={seed.size} textAnchor="middle" dominantBaseline="middle" opacity={germOpacity} style={{ userSelect: "none" }}>🦠</text>;
            })}
            <circle cx={cx} cy={cy} r={SLEEP_R} fill="none" stroke={s.color} strokeWidth={1 + immunity / 100} strokeDasharray="6 5" opacity={0.55 + (immunity / 100) * 0.4} />
            {rings.map((ring, ri) => {
              const r = RING_START + ri * GAP, arc = 2 * Math.PI * r, fill = 0.23 + ((ring.idx + 1) / INTENSITY_STEPS) * 0.47;
              return <circle key={ri} cx={cx} cy={cy} r={r} fill="none" stroke={ring.color} strokeWidth={ring.isFirstTime ? 1.5 : 7} strokeDasharray={`${arc * fill} ${arc * (1 - fill)}`} strokeLinecap="round" style={{ animation: `${ri % 2 === 0 ? 'spinCW' : 'spinCCW'} ${ringDurs[ring.i]}s linear infinite`, transformOrigin: `${cx}px ${cy}px` }} />;
            })}
          </svg>
          <div style={{ position: "relative", zIndex: 2, animation: "brainFloat 3.5s ease-in-out infinite" }}><BrainSVG size={BRAIN} /></div>
        </div>
      );
    }

    function ActivityChip({ activity, aIdx, intensityIdx, onSet, onClear, expanded, onToggle }) {
      const active = intensityIdx !== null, rc = RING_COLORS[aIdx % RING_COLORS.length], barPct = active ? ((intensityIdx + 1) / INTENSITY_STEPS) * 100 : 0;
      return (
        <div style={{ borderRadius: 14, overflow: "hidden", background: expanded ? BP.sliderBg : BP.basecolour, transition: "background .4s ease", cursor: "pointer", marginBottom: 8 }} onClick={onToggle}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px 6px" }}>
            <span style={{ fontSize: "1.2rem", minWidth: 26 }}>{activity.emoji}</span>
            <span style={{ fontFamily: FONTS.body, fontWeight: active ? 600 : 400, fontSize: "1rem", color: expanded ? BP.sliderFg : active ? BP.textMed : BP.textLight, flex: 1 }}>{activity.label}</span>
            {expanded ? <button onClick={(e) => { e.stopPropagation(); onToggle(); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: BP.roundbuttons, color: BP.white }}>✓</button> : <button onClick={(e) => { e.stopPropagation(); onSet(0); }} style={{ width: 26, height: 26, borderRadius: "50%", border: "none", background: BP.pink, color: BP.white }}>+</button>}
          </div>
          {active && !expanded && <div style={{ margin: "0 14px 8px", height: 3, background: "rgba(0,0,0,0.07)", borderRadius: 3, overflow: "hidden" }}><div style={{ height: "100%", width: `${barPct}%`, background: rc }} /></div>}
          {expanded && <div style={{ padding: "10px 14px" }} onClick={e => e.stopPropagation()}><input type="range" min="0" max="8" value={intensityIdx ?? 0} onChange={e => onSet(parseInt(e.target.value))} style={{ width: '100%' }} /></div>}
        </div>
      );
    }

    function Schedule({ tvToday }) {
      return (
        <div style={{ marginTop: 50, padding: "20px 24px", borderRadius: 24, background: BP.basecolour, display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ fontSize: "2.4rem" }}>{tvToday === "yes" ? "🏆" : "⚡"}</div>
          <div>
            <div style={{ fontFamily: FONTS.body, fontWeight: 700, color: BP.text }}>Now: Is it TV time?</div>
            <div style={{ fontFamily: FONTS.body, fontSize: "1rem", color: BP.pink, fontWeight: 600 }}>{tvToday === "yes" ? "TV Time" : "No, brain is still zapping TV germs"}</div>
          </div>
        </div>
      );
    }

    function App() {
      const [immunity, setImmunity] = useState(SLEEP_BASE);
      const [tab, setTab] = useState("immunity");
      const [intensities, setIntensities] = useState({});
      const [tvToday, setTvToday] = useState("no");
      const [germLevel, setGermLevel] = useState(1);
      const [expanded, setExpanded] = useState(null);
      const [secretMode, setSecretMode] = useState(false);
      const [secretTaps, setSecretTaps] = useState(0);

      useEffect(() => {
        const s = load("zap-zap-v1");
        if (s) { setImmunity(s.immunity); setIntensities(s.intensities); setTvToday(s.tvToday); setGermLevel(s.germLevel); }
      }, []);

      useEffect(() => { save("zap-zap-v1", { immunity, intensities, tvToday, germLevel }); }, [immunity, intensities, tvToday, germLevel]);

      const setInt = (a, idx) => {
        const prev = intensities[a.id] ?? null;
        const change = Math.round(a.power * intensityMult(idx)) - (prev !== null ? Math.round(a.power * intensityMult(prev)) : 0);
        setImmunity(p => Math.min(100, Math.max(0, p + change)));
        setIntensities(p => ({ ...p, [a.id]: idx }));
      };

      const handleAdminTap = () => {
        const n = secretTaps + 1; setSecretTaps(n);
        if (n >= 5) { setSecretMode(!secretMode); setTab(secretMode ? "immunity" : "parent"); setSecretTaps(0); }
        else setTimeout(() => setSecretTaps(0), 1500);
      };

      return (
        <div style={{ minHeight: "100vh", background: BP.basecolour, paddingBottom: 120 }}>
          <div style={{ maxWidth: 420, margin: "0 auto", padding: "32px 16px 0" }}>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div className="elsie" style={{ fontSize: "2.4rem", color: BP.text }}>Zap Zap</div>
              {secretMode && <div style={{ background: BP.pink, borderRadius: 20, padding: "3px 14px", fontSize: "0.65rem" }}>🔓 admin unlocked</div>}
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 22, marginBottom: 16 }}>
              {KIDS.map(k => <div key={k.id} style={{ textAlign: "center" }}><div style={{ width: 54, height: 54, borderRadius: "50%", background: k.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.8rem" }}>{k.emoji}</div></div>)}
            </div>

            {tab === "immunity" && (
              <div style={{ animation: "fadeIn .35s ease" }}>
                <BrainShield intensities={intensities} immunity={immunity} germLevel={germLevel} />
                <div style={{ textAlign: "center", color: '#FFF', opacity: 0.6, fontSize: '0.8rem', marginBottom: 20 }}>{getStr(immunity).label}</div>
                {ACTIVITIES.map((a, i) => <ActivityChip key={a.id} activity={a} aIdx={i} intensityIdx={intensities[a.id] ?? null} expanded={expanded === a.id} onToggle={() => setExpanded(expanded === a.id ? null : a.id)} onSet={idx => setInt(a, idx)} onClear={() => {}} />)}
              </div>
            )}
            {tab === "schedule" && <Schedule tvToday={tvToday} />}
            {tab === "parent" && secretMode && (
               <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                 <button onClick={() => setTvToday(tvToday === "yes" ? "no" : "yes")} style={{ padding: 15, background: BP.pink, border: "none", color: "white", borderRadius: 12 }}>Toggle TV: {tvToday.toUpperCase()}</button>
                 {[0,1,2,3].map(l => <button key={l} onClick={() => setGermLevel(l)} style={{ padding: 10, background: germLevel === l ? BP.pink : "rgba(255,255,255,0.1)", border: "none", color: "white", borderRadius: 8 }}>Germ Level {l}</button>)}
               </div>
            )}
          </div>
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: BP.basecolour, display: "flex", padding: "10px", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
            <button onClick={() => setTab("immunity")} style={{ flex: 1, padding: 10, background: "none", border: "none", color: tab === "immunity" ? BP.pink : "white" }}>🛡️</button>
            <button onClick={handleAdminTap} style={{ flex: 1, padding: 10, background: "none", border: "none", color: secretMode ? "white" : "rgba(255,255,255,0.1)" }}>⚙️</button>
            <button onClick={() => setTab("schedule")} style={{ flex: 1, padding: 10, background: "none", border: "none", color: tab === "schedule" ? BP.pink : "white" }}>📺</button>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
