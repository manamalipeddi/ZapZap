<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#290b47">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#290b47">
  <meta name="background-color" content="#290b47">
  
  <title>Zap Zap</title>
  
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" purpose="any maskable">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #290b47; overflow-x: hidden; font-family: 'Montserrat', sans-serif; color: #fff; }
    #root { height: 100%; width: 100%; }
    @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes brainFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 15px 0; }
    input[type=range]::-webkit-slider-runnable-track { height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #00F0FF; margin-top: -7px; box-shadow: 0 0 15px #00F0FF; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BP = {
 pink: "#e60c78",
 roundbuttons: "#290b47",
 white: "#FFFF11",
 cyan: "#00F0FF",
 basecolour: "#290b47",
 roundbuttonsTint: "#E6F7F7",
 text: "#FFFFFF",
 textMed: "#FFFFFF",
 textLight: "#FFFFFF",
 textDark: "#290b47",
 coral: "#E05070",
 gold: "#D4A020",
 sliderBg: "#e60c78",
 sliderFg: "#290b47",
};


// ─────────────────────────────────────────────────────────────────
// ── FONTS — edit here to change fonts across the whole app ───────
// ─────────────────────────────────────────────────────────────────
const FONTS = {
 // We combine Henny Penny and a clean body font (like Montserrat) in one URL
 importUrl:
   "https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Palette+Mosaic&display=swap",


 // Title font for "ZapZap"
 title: "'Palette Mosaic', system-ui, serif",


 // Body font for "Outside Time", "Reading", etc.
 body: "'Montserrat', Verdana, sans-serif",
};
// ─────────────────────────────────────────────────────────────────


const RING_COLORS = [
 "#F5C7F2", //outsidetime
 "#00FFC5", //veggies
 "#FFFD77", //reading
 "#85C7F2", //writing
 "#FF5F59", //creating
 "#B2B09B", //puzzles
 "#E3B5A4", //first
 "#FFB300",
];
const INTENSITY_STEPS = 9; // slider steps — stored as 0–8
// Map 0–8 index to a 0.1–1.0 multiplier smoothly
const intensityMult = (idx) => 0.1 + (idx / (INTENSITY_STEPS - 1)) * 0.9;
const TV_POWER = 15;
const SLEEP_BASE = 10;


const ACTIVITIES = [
 { id: "outside", label: "Outside Time", emoji: "⚽", power: 30 },
 { id: "veggies", label: "Eating Veggies", emoji: "🥦", power: 10 },
 { id: "reading", label: "Reading", emoji: "📚", power: 15 },
 { id: "writing", label: "Writing", emoji: "✏️", power: 15 },
 { id: "creating", label: "Creating", emoji: "🪄", power: 15 },
 { id: "puzzles", label: "Puzzles", emoji: "♟️", power: 15 },
 {
   id: "firsttime",
   label: "First Time!",
   emoji: "🌟",
   power: 8,
   isFirstTime: true,
 },
];


const KIDS = [
 { id: "lara", name: "Lara", emoji: "👧🏻", color: "#e60c78" },
 { id: "ari", name: "Ari", emoji: "👦🏻", color: "#ff6c06" },
 { id: "astrid", name: "Astrid", emoji: "👶🏻", color: "#f42a53" },
];


const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const GLOW = 1000;


const STRENGTH = [
 { min: 0, max: 14, label: "Thin Protection", color: BP.textLight },
 { min: 15, max: 29, label: "Small Protection", color: BP.textLight },
 { min: 30, max: 49, label: "Some Protection", color: BP.textLight },
 { min: 50, max: 64, label: "Good Protection", color: BP.textLight },
 { min: 65, max: 79, label: "Strong Protection", color: BP.textLight },
 {
   min: 80,
   max: 100,
   label: "Super Strong Protection! 💪",
   color: BP.textLight,
 },
];
const getStr = (lv) =>
 STRENGTH.find((s) => lv >= s.min && lv <= s.max) || STRENGTH[0];


async function load(k) {
 try {
   const r = await window.storage.get(k);
   return r ? JSON.parse(r.value) : null;
 } catch {
   return null;
 }
}
async function save(k, v) {
 try {
   await window.storage.set(k, JSON.stringify(v));
 } catch {}
}

// ── Brain + shield rings ───────────────────────────────────────────
function BrainShield({ intensities, immunity, isGlowing, germLevel = 0 }) {
 const BRAIN = 100,
   SLEEP_R = BRAIN,
   RING_START = SLEEP_R + 10,
   GAP = 10;


 // germLevel 0 = none, 1 = normal, 2 = medium, 3 = high
 const germOpacity = [0, 0.18, 0.42, 0.72][germLevel];
 const germCount = [0, 10, 18, 28][germLevel];
 // How dramatically germs bounce outward: px of extra bounce at each level
 const bounceAmp = [0, 8, 22, 48][germLevel];
 // Bounce speed: lower = slower drift, higher = snappier
 const bounceSpeed = [0, 5, 3.5, 2][germLevel];


 // Sparks — count scales with germLevel, everything else stays constant
 const sparkCountBase = [0, 2, 5, 9][germLevel];


 const [sparks, setSparks] = useState([]);
 const sparkId = useRef(0);
 useEffect(() => {
   const iv = setInterval(() => {
     if (germLevel === 0) return;
     const count = sparkCountBase + Math.floor(Math.random() * 2);
     const base = Math.random() * 2 * Math.PI;
     setSparks(
       Array.from({ length: count }, (_, i) => ({
         id: sparkId.current++,
         angle: base + (i - count / 2) * 0.35 + (Math.random() - 0.5) * 0.2,
         size: 2 + Math.random() * 2,
         travel: 20 + Math.random() * 20,
         dur: 700 + Math.random() * 300,
         color: "#FFD700",
       }))
     );
     setTimeout(() => setSparks([]), 1100);
   }, 2200);
   return () => clearInterval(iv);
 }, [germLevel]);


 // Store only stable per-germ random seeds — never positions (those are computed live)
 const seeds = useRef(
   [...Array(28)].map((_, i) => {
     // Split evenly between left side (around π) and right side (around 0/2π)
     // Each half gets angles spread within a ±70° arc on its side
     const isRight = i % 2 === 0;
     const spread = (Math.random() - 0.5) * 2.4; // ±1.2 rad = roughly ±70°
     const angle = isRight ? spread : Math.PI + spread;
     return {
       angle,
       bandFrac: Math.random(),
       size: Math.random() * 16 + 11,
       speedMult: 0.7 + Math.random() * 0.6,
       rotation: Math.random() * 360,
     };
   })
 ).current;


 // Stable per-ring spin durations — must not use Math.random() at render time
 const ringDurs = useRef(
   ACTIVITIES.map((_, i) => 8 + i * 0.7 + Math.random() * 2)
 ).current;


 const rings = ACTIVITIES.map((a, i) => ({
   idx: intensities[a.id] ?? null,
   color: RING_COLORS[i % RING_COLORS.length],
   i,
   isFirstTime: !!a.isFirstTime,
 })).filter((r) => r.idx !== null);


 const maxR =
   rings.length > 0 ? RING_START + (rings.length - 1) * GAP : RING_START;
 const pad = 4,
   W = (maxR + pad) * 2,
   H = (maxR + pad) * 2,
   cx = W / 2,
   cy = H / 2;
 const s = getStr(immunity);
 const sleepThick = 1 + immunity / 100;
 const dashLen = 6,
   gapLen = 5;


 // Band where germs live: from just outside sleep ring to beyond outermost activity ring
 // As activities are added, maxR grows and the OUTER edge of the band expands — germs spread out
 const bandInner = SLEEP_R + 6;
 const bandOuter = maxR + 44; // always extends well beyond outermost ring


 // Build per-germ bounce keyframe CSS — each germ bounces radially outward along its own angle
 const germKeyframes =
   germCount > 0
     ? seeds
         .slice(0, germCount)
         .map((seed, i) => {
           const dx = Math.cos(seed.angle) * bounceAmp;
           const dy = Math.sin(seed.angle) * bounceAmp;
           const r = seed.rotation; // static rotation baked into every frame
           return `
         @keyframes gb${i} {
           0%   { transform: translate(0, 0) rotate(${r}deg) scale(1); }
           40%  { transform: translate(${-dx * 0.3}px, ${
             -dy * 0.3
           }px) rotate(${r}deg) scale(0.88); }
           60%  { transform: translate(${dx}px, ${dy}px) rotate(${r}deg) scale(${
             1 + germLevel * 0.08
           }); }
           75%  { transform: translate(${dx * 0.6}px, ${
             dy * 0.6
           }px) rotate(${r}deg) scale(1.02); }
           100% { transform: translate(0, 0) rotate(${r}deg) scale(1); }
         }
       `;
         })
         .join("")
     : "";


 return (
   <div
     style={{
       position: "relative",
       width: W,
       height: H,
       margin: "0 auto",
       display: "flex",
       alignItems: "center",
       justifyContent: "center",
     }}
   >
     <svg
       width={W}
       height={H}
       style={{ position: "absolute", inset: 0, overflow: "visible" }}
     >
       {/* Per-germ bounce keyframes — injected fresh so they reflect current germLevel */}
       {germCount > 0 && <style>{germKeyframes}</style>}


       {/* Germs — positions computed live from current maxR so they spread as activities are added */}
       {germCount > 0 &&
         seeds.slice(0, germCount).map((seed, i) => {
           // radialDist: linearly interpolate between bandInner and bandOuter using bandFrac
           // As bandOuter grows with maxR, germs with higher bandFrac move further out
           const radialDist =
             bandInner + seed.bandFrac * (bandOuter - bandInner);
           const gx = cx + Math.cos(seed.angle) * radialDist;
           const gy = cy + Math.sin(seed.angle) * radialDist;
           const dur = bounceSpeed * seed.speedMult;
           return (
             <text
               key={`germ-${i}`}
               x={gx}
               y={gy}
               fontSize={seed.size}
               textAnchor="middle"
               dominantBaseline="middle"
               opacity={germOpacity}
               style={{
                 userSelect: "none",
                 animation:
                   germLevel > 0
                     ? `gb${i} ${dur}s ease-in-out infinite`
                     : "none",
                 transformOrigin: `${gx}px ${gy}px`,
               }}
             >
               🦠
             </text>
           );
         })}


       {/* Sleep ring — dotted */}
       <circle
         cx={cx}
         cy={cy}
         r={SLEEP_R}
         fill="none"
         stroke={s.color}
         strokeWidth={sleepThick}
         strokeDasharray={`${dashLen} ${gapLen}`}
         opacity={0.55 + (immunity / 100) * 0.4}
         style={{
           filter:
             immunity > 40
               ? `drop-shadow(0 0 ${3 + immunity / 25}px ${s.color})`
               : "none",
           transition:
             "stroke 1s ease,stroke-width 0.6s ease,opacity 0.6s ease",
         }}
       />


       {/* Activity rings */}
       {rings.map((ring, ri) => {
         const r = RING_START + ri * GAP;
         // Fixed thickness — no change with intensity, only FirstTime is thinner
         const thick = ring.isFirstTime ? 1.5 : 7;
         const arc = 2 * Math.PI * r;
         // Arc length = slider value mapped to 23%–70% of circumference
         const fill = 0.23 + ((ring.idx + 1) / INTENSITY_STEPS) * 0.47;
         const dur = ringDurs[ring.i] ?? 9;
         const anim = ri % 2 === 0 ? "spinCW" : "spinCCW";
         return (
           <g key={ring.i}>
             <circle
               cx={cx}
               cy={cy}
               r={r}
               fill="none"
               stroke={ring.color}
               strokeWidth={1.2}
               opacity={0}
             />
             <circle
               cx={cx}
               cy={cy}
               r={r}
               fill="none"
               stroke={ring.color}
               strokeWidth={thick}
               strokeDasharray={`${arc * fill} ${arc * (1 - fill)}`}
               strokeLinecap="round"
               opacity={1}
               style={{
                 animation: `${anim} ${dur}s linear infinite`,
                 filter: `drop-shadow(0 0 ${
                   ring.isFirstTime ? 1 : 2 + Math.round(ring.idx / 3)
                 }px ${ring.color}77)`,
                 transformOrigin: `${cx}px ${cy}px`,
               }}
             />
           </g>
         );
       })}
       {isGlowing && (
         <circle
           cx={cx}
           cy={cy}
           r={maxR + 12}
           fill="none"
           stroke={BP.cyan}
           strokeWidth={2}
           opacity={0.22}
           style={{ animation: "haloPulse 2s ease-in-out infinite" }}
         />
       )}


       {/* Sparks firing from brain surface */}
       {sparks.map((spark) => {
         const BRAIN_R = BRAIN / 2;
         // Origin: on the brain surface
         const ox = cx + Math.cos(spark.angle) * BRAIN_R;
         const oy = cy + Math.sin(spark.angle) * BRAIN_R;
         // Destination: travel outward
         const tx = Math.cos(spark.angle) * spark.travel;
         const ty = Math.sin(spark.angle) * spark.travel;
         const animName = `spark-${spark.id}`;
         return (
           <g key={spark.id}>
             <style>{`
               @keyframes ${animName} {
                 0%   { transform: translate(0,0); opacity: 0.9; r: ${
                   spark.size
                 }; }
                 70%  { transform: translate(${tx}px,${ty}px); opacity: 0.6; }
                 100% { transform: translate(${tx * 1.15}px,${
               ty * 1.15
             }px); opacity: 0; }
               }
             `}</style>
             <circle
               cx={ox}
               cy={oy}
               r={spark.size}
               fill={spark.color}
               style={{
                 animation: `${animName} ${spark.dur}ms ease-out forwards`,
                 transformOrigin: `${ox}px ${oy}px`,
                 filter: `drop-shadow(0 0 3px ${spark.color})`,
               }}
             />
           </g>
         );
       })}
     </svg>
     <div
       style={{
         position: "relative",
         zIndex: 2,
         animation: "brainFloat 3.5s ease-in-out infinite",
       }}
     >
       <BrainSVG size={BRAIN} />
     </div>
   </div>
 );
}


function StrengthLabel({ immunity }) {
 const s = getStr(immunity);
 return (
   <div
     style={{
       textAlign: "center",
       marginTop: 10,
       marginBottom: 30,
       fontFamily: FONTS.body,
       fontWeight: 600,
       fontSize: "0.5rem",
       color: s.color,
       transition: "color 0.8s ease",
       opacity: 0.6,
     }}
   >
     {s.label}
   </div>
 );

// ── Slider ─────────────────────────────────────────────────────────
function Slider({ steps, value, onChange, fill, dir = "up" }) {
 const ref = useRef(null),
   drag = useRef(false);
 const step = (cx) => {
   const rect = ref.current?.getBoundingClientRect();
   if (!rect) return 0;
   const r = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
   return dir === "up" ? Math.round(r * steps) : steps - Math.round(r * steps);
 };
 const tPct =
   dir === "up" ? (value / steps) * 100 : ((steps - value) / steps) * 100;
 return (
   <div
     ref={ref}
     onPointerDown={(e) => {
       drag.current = true;
       ref.current?.setPointerCapture(e.pointerId);
       onChange(step(e.clientX));
     }}
     onPointerMove={(e) => {
       if (drag.current) onChange(step(e.clientX));
     }}
     onPointerUp={() => {
       drag.current = false;
     }}
     onPointerCancel={() => {
       drag.current = false;
     }}
     style={{
       position: "relative",
       height: 32,
       display: "flex",
       alignItems: "center",
       cursor: "ew-resize",
       userSelect: "none",
       touchAction: "none",
     }}
   >
     <div
       style={{
         position: "absolute",
         left: 0,
         right: 0,
         height: 5,
         background: "rgba(255,255,255,0.0)",
       }}
     />
     <div
       style={{
         position: "absolute",
         left: dir === "up" ? 0 : `${tPct}%`,
         width: dir === "up" ? `${tPct}%` : `${100 - tPct}%`,
         height: 9,
         background: fill,
         transition: "width .2s ease,left .4s ease",
         borderRadius: 10,
         overflow: "hidden", // Ensures the 'fill' doesn't bleed past the corners
       }}
     />
     {value > 0 && (
       <div
         style={{
           position: "absolute",
           left: `calc(${tPct}% - 11px)`,
           width: 0,
           height: 0,
           zIndex: 2,
         }}
       />
     )}
   </div>
 );
}

         >
           Zap Zap
         </div>
         {secretMode && (
           <div
             style={{
               display: "inline-block",
               marginTop: 6,
               background: BP.pink,
               borderRadius: 20,
               padding: "3px 14px",
               fontFamily: FONTS.body,
               fontWeight: 700,
               fontSize: "0.65rem",
               color: BP.white,
             }}
           >
             🔓 admin mode on
           </div>
         )}
       </div>


       {/* Kids */}
       <div
         style={{
           display: "flex",
           justifyContent: "center",
           gap: 22,
           marginBottom: 16,
         }}
       >
         {KIDS.map((k) => (
           <div key={k.id} style={{ textAlign: "center" }}>
             <div
               style={{
                 width: 54,
                 height: 54,
                 borderRadius: "50%",
                 background: k.color,
                 display: "flex",
                 alignItems: "center",
                 justifyContent: "center",
                 fontSize: "1.8rem",
                 margin: "0 auto 5px",
                 boxShadow: `0 3px 12px ${k.color}88`,
               }}
             >
               {k.emoji}
             </div>
             <div
               style={{
                 fontFamily: FONTS.body,
                 fontWeight: 600,
                 fontSize: "0.65rem",
                 color: BP.textLight,
               }}
             >
               {k.name}
             </div>
           </div>
         ))}
       </div>


       {/* Content */}
       {tab === "immunity" && (
         <div
           style={{
             animation: "fadeIn .35s ease",
             display: "flex",
             flexDirection: "column",
             gap: 4,
           }}
         >
           <div
             style={{
               textAlign: "center",
               padding: "40px 0 50px",
               overflow: "visible",
             }}
           >
             <BrainShield
               intensities={intensities}
               immunity={immunity}
               isGlowing={isGlowing}
               germLevel={germLevel}
             />
           </div>
           {ACTIVITIES.map((a, i) => (
             <div
               key={a.id}
               style={{ animation: `fadeIn .3s ease ${i * 0.04}s both` }}
               onClick={(e) => e.stopPropagation()}
             >
               <ActivityChip
                 activity={a}
                 aIdx={i}
                 intensityIdx={intensities[a.id] ?? null}
                 onSet={(idx) => {
                   setInt(a, idx);
                   setExpanded(a.id);
                 }}
                 onClear={() => clearAct(a)}
                 expanded={expanded === a.id}
                 onToggle={() =>
                   setExpanded((prev) => (prev === a.id ? null : a.id))
                 }
               />
             </div>
           ))}
         </div>
       )}


       {tab === "schedule" && (
         <div style={{ animation: "fadeIn .35s ease" }}>
           <Schedule tvToday={tvToday} tvTomorrow={tvTomorrow} />
         </div>
       )}


       {tab === "parent" && secretMode && (
         <div
           style={{
             animation: "fadeIn .35s ease",
             display: "flex",
             flexDirection: "column",
             gap: 12,
           }}
         >
           {/* Today TV status */}
           <div
             style={{
               fontFamily: FONTS.body,
               fontSize: "0.7rem",
               color: BP.textLight,
               opacity: 0.6,
               marginBottom: 4,
             }}
           >
             Today's screen time
           </div>
           <div style={{ display: "flex", gap: 8 }}>
             <button
               onClick={() => setTvToday("yes")}
               style={{
                 flex: 1,
                 padding: "14px",
                 borderRadius: 16,
                 border: "none",
                 background:
                   tvToday === "yes" ? BP.pink : "rgba(255,255,255,0.08)",
                 fontFamily: FONTS.body,
                 fontWeight: 700,
                 fontSize: "0.9rem",
                 color: BP.textLight,
                 cursor: "pointer",
                 transition: "background .2s",
               }}
             >
               🏆 Yes
             </button>
             <button
               onClick={() => setTvToday("no")}
               style={{
                 flex: 1,
                 padding: "14px",
                 borderRadius: 16,
                 border: "none",
                 background:
                   tvToday === "no" ? BP.pink : "rgba(255,255,255,0.08)",
                 fontFamily: FONTS.body,
                 fontWeight: 700,
                 fontSize: "0.9rem",
                 color: BP.textLight,
                 cursor: "pointer",
                 transition: "background .2s",
               }}
             >
               🦠 No
             </button>
           </div>


           {/* Germ level */}
           <div
             style={{
               fontFamily: FONTS.body,
               fontSize: "0.7rem",
               color: BP.textLight,
               opacity: 0.6,
               marginBottom: 4,
               marginTop: 8,
             }}
           >
             Screen germ level
           </div>
           {[
             {
               level: 0,
               label: "No germs",
               sub: "Clean, okay for screen time",
               icon: "✨",
             },
             {
               level: 1,
               label: "Normal",
               sub: "Low opacity · fewer germs",
               icon: "🦠",
             },
             {
               level: 2,
               label: "Medium screen time",
               sub: "More germs · higher opacity",
               icon: "🦠🦠",
             },
             {
               level: 3,
               label: "High screen time",
               sub: "Many germs · very visible",
               icon: "🦠🦠🦠",
             },
           ].map((opt) => (
             <button
               key={opt.level}
               onClick={() => setGermLevel(opt.level)}
               style={{
                 display: "flex",
                 flexDirection: "column",
                 alignItems: "flex-start",
                 padding: "14px 18px",
                 borderRadius: 16,
                 border: "none",
                 background:
                   germLevel === opt.level
                     ? BP.pink
                     : "rgba(255,255,255,0.08)",
                 cursor: "pointer",
                 textAlign: "left",
                 transition: "background .2s",
               }}
             >
               <span
                 style={{
                   fontFamily: FONTS.body,
                   fontWeight: 700,
                   fontSize: "0.9rem",
                   color: BP.textLight,
                 }}
               >
                 {opt.icon} {opt.label}
               </span>
               <span
                 style={{
                   fontFamily: FONTS.body,
                   fontSize: "0.68rem",
                   color: BP.textLight,
                   opacity: 0.6,
                   marginTop: 3,
                 }}
               >
                 {opt.sub}
               </span>
             </button>
           ))}
         </div>
       )}
     </div>


     {/* Bottom tabs */}
     <div
       style={{
         position: "fixed",
         bottom: 0,
         left: 0,
         right: 0,
         zIndex: 100,
         background: BP.basecolour,
         borderTop: `1px solid rgba(255,255,255,0.06)`,
       }}
     >
       <div
         style={{
           maxWidth: 420,
           margin: "0 auto",
           display: "flex",
           padding: "8px 16px 10px",
           gap: 4,
         }}
       >
         {tabs.map((t) => (
           <button
             key={t.id}
             onClick={() => {
               if (t.onPress) t.onPress();
               else setTab(t.id);
             }}
             style={{
               flex: 1,
               padding: "8px 0",
               borderRadius: 12,
               background:
                 !t.isAdmin && tab === t.id
                   ? "rgba(255,255,255,0.14)"
                   : "transparent",
               border:
                 !t.isAdmin && tab === t.id
                   ? "1px solid rgba(255,255,255,0.18)"
                   : "1px solid transparent",
               color: t.isAdmin
                 ? secretMode
                   ? "rgba(255,255,255,0.5)"
                   : "rgba(255,255,255,0.04)"
                 : tab === t.id
                 ? "rgba(255,255,255,0.9)"
                 : "rgba(255,255,255,0.35)",
               fontFamily: FONTS.body,
               fontWeight: tab === t.id ? 700 : 400,
               fontSize: "0.75rem",
               cursor: "pointer",
               transition: "all .2s",
             }}
           >
             {t.label}
           </button>
         ))}
       </div>
       <div
         style={{
           textAlign: "center",
           paddingBottom: 6,
           fontFamily: FONTS.body,
           fontSize: "0.52rem",
           color: BP.textLight,
           opacity: 0.4,
         }}
       >
         Zap Zap · Family Defense Lab
       </div>
     </div>
   </div>
 );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BrainBank />);

  </script>
</body>
</html>
