<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#290b47">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#290b47">
  <meta name="background-color" content="#290b47">
  <title>Zap Zap</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" purpose="any maskable">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #290b47; overflow-x: hidden; font-family: 'Nanum Gothic', sans-serif; color: #fff; }
    #root { height: 100%; width: 100%; }
    @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes brainFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 15px 0; }
    input[type=range]::-webkit-slider-runnable-track { height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #00F0FF; margin-top: -7px; box-shadow: 0 0 15px #00F0FF; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BP = {
      pink: "#e60c78",
      roundbuttons: "#290b47",
      white: "#FFFF11",
      cyan: "#00F0FF",
      basecolour: "#290b47",
      roundbuttonsTint: "#E6F7F7",
      text: "#FFFFFF",
      textMed: "#FFFFFF",
      textLight: "#FFFFFF",
      textDark: "#290b47",
      coral: "#E05070",
      gold: "#D4A020",
      sliderBg: "#e60c78",
      sliderFg: "#290b47",
    };

    // ─────────────────────────────────────────────────────────────────
    // ── FONTS — edit here to change fonts across the whole app ───────
    // ─────────────────────────────────────────────────────────────────
    const FONTS = {
      importUrl: "https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Palette+Mosaic&display=swap",
      title: "'Palette Mosaic', system-ui, serif",
      body: "'Nanum Gothic', Verdana, sans-serif",
    };
    // ─────────────────────────────────────────────────────────────────

    const RING_COLORS = [
      "#F5C7F2", // outside
      "#00FFC5", // veggies
      "#FFFD77", // reading
      "#85C7F2", // writing
      "#FF5F59", // creating
      "#B2B09B", // puzzles
      "#E3B5A4", // firsttime
      "#FFB300",
    ];

    const INTENSITY_STEPS = 9;
    const intensityMult = (idx) => 0.1 + (idx / (INTENSITY_STEPS - 1)) * 0.9;
    const TV_POWER = 15;
    const SLEEP_BASE = 10;

    const ACTIVITIES = [
      { id: "outside",   label: "Outside Time",            emoji: "⚽", power: 30 },
      { id: "veggies",   label: "Eating Veggies",          emoji: "🥦", power: 10 },
      { id: "reading",   label: "Reading",                 emoji: "📚", power: 15 },
      { id: "writing",   label: "Writing",                 emoji: "✏️", power: 15 },
      { id: "creating",  label: "Creating",                emoji: "🪄", power: 15 },
      { id: "puzzles",   label: "Puzzles",                 emoji: "♟️", power: 15 },
      { id: "firsttime", label: "Try/Learn Something New", emoji: "🌟", power: 15, isFirstTime: false },
    ];

    const KIDS = [
      { id: "lara",   name: "Lara",   emoji: "👧🏻", color: "#e60c78" },
      { id: "ari",    name: "Ari",    emoji: "👦🏻", color: "#ff6c06" },
      { id: "astrid", name: "Astrid", emoji: "👶🏻", color: "#f42a53" },
    ];

    const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const GLOW = 1000;

    const STRENGTH = [
      { min: 0,  max: 14,  label: "Thin Protection",             color: BP.textLight },
      { min: 15, max: 29,  label: "Small Protection",            color: BP.textLight },
      { min: 30, max: 49,  label: "Some Protection",             color: BP.textLight },
      { min: 50, max: 64,  label: "Good Protection",             color: BP.textLight },
      { min: 65, max: 79,  label: "Strong Protection",           color: BP.textLight },
      { min: 80, max: 100, label: "Super Strong Protection! 💪", color: BP.textLight },
    ];
    const getStr = (lv) => STRENGTH.find((s) => lv >= s.min && lv <= s.max) || STRENGTH[0];

    // ── Per-kid default ────────────────────────────────────────────
    const defaultProfile = () => ({ immunity: SLEEP_BASE, intensities: {} });

    // ── Storage — localStorage for Vercel persistence ──────────────
    function load(k) {
      try { const raw = localStorage.getItem(k); return raw ? JSON.parse(raw) : null; } catch { return null; }
    }
    function save(k, v) {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
    }

    // ── Brain SVG ──────────────────────────────────────────────────
    function BrainSVG({ size = 100 }) {
      return (
        <div style={{ height:"100dvh", background:BP.basecolour, display:"flex", flexDirection:"column", overflow:"hidden" }} onClick={()=>setExpanded(null)}>
          <style>{`
            @import url('${FONTS.importUrl}');
            .elsie{font-family:${FONTS.title}!important;font-weight:900;}
            @keyframes spinCW{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
            @keyframes spinCCW{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
            @keyframes brainFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
            @keyframes haloPulse{0%,100%{opacity:.2}50%{opacity:.55}}
            @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
            @keyframes softPulse{0%,100%{opacity:1}50%{opacity:.4}}
            button:active{transform:scale(.94)!important}
            *{box-sizing:border-box}
          `}</style>

          {/* Fixed top — title, brain, kids. Never scrolls. */}
          <div style={{ flexShrink:0, maxWidth:420, width:"100%", margin:"0 auto", padding:"24px 16px 0" }} onClick={e=>e.stopPropagation()}>

            {/* Header */}
            <div onClick={handleTitle} style={{ textAlign:"center", marginBottom:16, cursor:"pointer", userSelect:"none" }}>
              <div className="elsie" style={{ fontSize:"2.4rem", color:BP.text, lineHeight:1, letterSpacing:1 }}>Zap Zap</div>
              {secretMode && (
                <div style={{ display:"inline-block", marginTop:14, background:BP.pink, borderRadius:20, padding:"3px 14px", fontFamily:FONTS.body, fontWeight:700, fontSize:"0.65rem", color:BP.white }}>
                  🔓 admin mode on
                </div>
              )}
            </div>

            {/* Brain — fixed height = max size with all 7 rings, so kid buttons never shift */}
            {tab === "immunity" && (
              <div style={{ height:348, display:"flex", alignItems:"center", justifyContent:"center", overflow:"visible" }}>
                <BrainShield intensities={intensities} immunity={immunity} isGlowing={isGlowing} germLevel={germLevel}/>
              </div>
            )}

            {/* Kid selector */}
            {tab === "immunity" && (
              <div style={{ display:"flex", justifyContent:"center", gap:18, marginTop:16, marginBottom:8 }} onClick={e=>e.stopPropagation()}>
                {KIDS.map(k => {
                  const isSelected = selectedKid === k.id;
                  return (
                    <div key={k.id} style={{ textAlign:"center", cursor:"pointer" }}
                      onClick={e=>{e.stopPropagation();setSelectedKid(k.id);setExpanded(null);}}>
                      <div style={{
                        width:52, height:52, borderRadius:"50%", background:k.color,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:"1.7rem", margin:"0 auto 5px",
                        boxShadow: isSelected ? "0 0 0 2px #00FFC5" : `0 3px 12px ${k.color}44`,
                        transition:"box-shadow 0.2s ease, opacity 0.2s ease",
                        opacity: isSelected ? 1 : 0.5,
                      }}>
                        {k.emoji}
                      </div>
                      <div style={{ fontFamily:FONTS.body, fontWeight:isSelected?700:400, fontSize:"0.65rem", color:isSelected?BP.text:BP.textLight, transition:"all 0.2s" }}>
                        {k.name}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Scrollable section — only this moves */}
          <div style={{ flex:1, overflowY:"auto", maxWidth:420, width:"100%", margin:"0 auto", padding:"0 16px 100px" }} onClick={e=>e.stopPropagation()}>

            {tab === "immunity" && (
              <div style={{ animation:"fadeIn .35s ease", display:"flex", flexDirection:"column", gap:4 }}>
                {ACTIVITIES.map((a, i) => (
                  <div key={a.id} style={{ animation:`fadeIn .3s ease ${i*0.04}s both` }} onClick={e=>e.stopPropagation()}>
                    <ActivityChip
                      activity={a} aIdx={i}
                      intensityIdx={intensities[a.id] ?? null}
                      onSet={idx=>{setInt(a,idx);setExpanded(a.id);}}
                      onClear={()=>clearAct(a)}
                      expanded={expanded===a.id}
                      onToggle={()=>setExpanded(prev=>prev===a.id?null:a.id)}
                    />
                  </div>
                ))}
              </div>
            )}

            {tab === "schedule" && (
              <div style={{ animation:"fadeIn .35s ease" }}>
                <Schedule tvToday={tvToday} tvTomorrow={tvTomorrow}/>
              </div>
            )}

            {tab === "parent" && secretMode && (
              <div style={{ animation:"fadeIn .35s ease", display:"flex", flexDirection:"column", gap:12, paddingTop:16 }}>
                <div style={{ fontFamily:FONTS.body, fontSize:"0.7rem", color:BP.textLight, opacity:0.6, marginBottom:4 }}>Screen Time Today</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>setTvToday("yes")} style={{ flex:1, padding:"14px", borderRadius:16, border:"none", background:tvToday==="yes"?BP.pink:"rgba(255,255,255,0.08)", fontFamily:FONTS.body, fontWeight:700, fontSize:"0.9rem", color:BP.textLight, cursor:"pointer", transition:"background .2s" }}>✔️ Yes</button>
                  <button onClick={()=>setTvToday("no")}  style={{ flex:1, padding:"14px", borderRadius:16, border:"none", background:tvToday==="no" ?BP.pink:"rgba(255,255,255,0.08)", fontFamily:FONTS.body, fontWeight:700, fontSize:"0.9rem", color:BP.textLight, cursor:"pointer", transition:"background .2s" }}>✖️ No</button>
                </div>
                <div style={{ fontFamily:FONTS.body, fontSize:"0.7rem", color:BP.textLight, opacity:0.6, marginBottom:4, marginTop:8 }}>TV Germs Level</div>
                {[
                  { level:0, label:"No Germs",  sub:"",                            icon:"✨"      },
                  { level:1, label:"Level 1",    sub:"Few germs · low opacity",     icon:"🦠"     },
                  { level:2, label:"Level 2",    sub:"More germs · higher opacity", icon:"🦠🦠"   },
                  { level:3, label:"Level 3",    sub:"Many germs · very visible",   icon:"🦠🦠🦠" },
                ].map(opt => (
                  <button key={opt.level} onClick={()=>setGermLevel(opt.level)}
                    style={{ display:"flex", flexDirection:"column", alignItems:"flex-start", padding:"14px 18px", borderRadius:16, border:"none", background:germLevel===opt.level?BP.pink:"rgba(255,255,255,0.08)", cursor:"pointer", textAlign:"left", transition:"background .2s" }}>
                    <span style={{ fontFamily:FONTS.body, fontWeight:700, fontSize:"0.9rem", color:BP.textLight }}>{opt.icon} {opt.label}</span>
                    <span style={{ fontFamily:FONTS.body, fontSize:"0.68rem", color:BP.textLight, opacity:0.6, marginTop:3 }}>{opt.sub}</span>
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Bottom tabs — fixed */}
          <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:100, background:BP.basecolour, borderTop:"1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ maxWidth:420, margin:"0 auto", display:"flex", padding:"8px 16px 10px", gap:4 }}>
              {tabs.map(t => (
                <button key={t.id} onClick={()=>{ if(t.onPress) t.onPress(); else setTab(t.id); }}
                  style={{
                    flex:1, padding:"8px 0", borderRadius:12,
                    background: !t.isAdmin && tab===t.id ? "rgba(255,255,255,0.14)" : "transparent",
                    border: !t.isAdmin && tab===t.id ? "1px solid rgba(255,255,255,0.18)" : "1px solid transparent",
                    color: t.isAdmin ? (secretMode?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.04)") : (tab===t.id?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.35)"),
                    fontFamily:FONTS.body, fontWeight:tab===t.id?700:400, fontSize:"0.75rem", cursor:"pointer", transition:"all .2s",
                  }}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{ textAlign:"center", paddingBottom:6, fontFamily:FONTS.body, fontSize:"0.52rem", color:BP.textLight, opacity:0.4 }}>
              Zap Zap · Family Defense Lab
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BrainBank/>);
  </script>
</body>
</html>
